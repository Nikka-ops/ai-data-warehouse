apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ai-warehouse
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
    - job_name: 'ai-agent'
      static_configs:
      - targets: ['ai-agent:8000']
      metrics_path: /metrics
    - job_name: 'flink'
      static_configs:
      - targets: ['flink-jobmanager:8081']
      metrics_path: /metrics
    - job_name: 'clickhouse'
      static_configs:
      - targets: ['clickhouse:9363']
