apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: ai-warehouse
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      isDefault: true
    - name: ClickHouse
      type: grafana-clickhouse-datasource
      url: http://clickhouse:8123
      jsonData:
        defaultDatabase: dws
