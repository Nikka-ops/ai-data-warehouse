apiVersion: v1
kind: Service
metadata:
  name: ai-agent
  namespace: ai-warehouse
spec:
  selector:
    app: ai-agent
  ports:
  - name: api
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-agent-ingress
  namespace: ai-warehouse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-warehouse.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ai-agent
            port:
              number: 8000
