apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: ai-warehouse
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
  - name: rpc
    port: 6123
  - name: ui
    port: 8081
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager-ui
  namespace: ai-warehouse
spec:
  selector:
    app: flink
    component: jobmanager
  ports:
  - name: ui
    port: 8081
    targetPort: 8081
  type: LoadBalancer
