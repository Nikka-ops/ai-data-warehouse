apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: ai-warehouse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
      - name: taskmanager
        image: flink:1.18-scala_2.12
        args: ["taskmanager"]
        env:
        - name: FLINK_PROPERTIES
          valueFrom:
            configMapKeyRef:
              name: flink-config
              key: flink-conf.yaml
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
