apiVersion: 1

datasources:
  # Prometheus：ClickHouse 系统指标
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # ClickHouse：业务数据直查（通过 grafana-clickhouse-datasource 插件）
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    url: http://clickhouse:8123
    access: proxy
    editable: true
    jsonData:
      server:   clickhouse
      port:     8123
      username: ${CLICKHOUSE_USER}
      defaultDatabase: dws
      protocol: http
      secure:   false
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
