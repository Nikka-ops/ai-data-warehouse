global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: ai-data-warehouse
    env:     production

# ── 抓取目标配置 ──────────────────────────────────────────────
scrape_configs:

  # ClickHouse 系统指标（内置 Prometheus 端点）
  - job_name: clickhouse
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '$1'

  # Prometheus 自身指标
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
