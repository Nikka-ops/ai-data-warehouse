version: "3.8"

# ── 公共环境变量 ──────────────────────────────────────────────
x-common-env: &common-env
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_ORDERS_TOPIC: orders_stream
  KAFKA_PAYMENTS_TOPIC: payments_stream
  KAFKA_FLINK_STATS_TOPIC: flink.minute_stats
  KAFKA_FLINK_DWD_TOPIC: flink.realtime_dwd
  KAFKA_FLINK_ALERTS_TOPIC: flink.alerts
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
  LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

# ── 公共重启策略 ──────────────────────────────────────────────
x-restart: &restart-policy
  restart: on-failure
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

# ── 网络 ──────────────────────────────────────────────────────
# frontend: 可被 Nginx 暴露的 Web 服务
# backend:  数据/AI 内部服务，不对外暴露
networks:
  frontend:
    name: ai_dw_frontend
  backend:
    name: ai_dw_backend

services:

  # ════════════════════════════════════════════════════════════
  # 基础设施层
  # ════════════════════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ai_dw_zookeeper
    networks: [backend]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *restart-policy

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ai_dw_kafka
    networks: [backend]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: -1           # Kappa 架构：永久保留，日志即数据
      KAFKA_LOG_RETENTION_BYTES: -1           # 不按大小限制（按磁盘容量规划）
      KAFKA_LOG_SEGMENT_BYTES: 536870912      # 512MB per segment
      KAFKA_NUM_PARTITIONS: 3                 # 3分区提升并行度
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_CLEANUP_POLICY: delete        # 保留全量日志，不压缩（保留 offset 可回放）
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    <<: *restart-policy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ai_dw_kafka_ui
    networks: [frontend, backend]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: ai-dw-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    <<: *restart-policy

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: ai_dw_clickhouse
    networks: [backend]
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/config:/etc/clickhouse-server/config.d   # 生产配置挂载
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client",
             "--user=${CLICKHOUSE_USER:-admin}",
             "--password=${CLICKHOUSE_PASSWORD:-admin123}",
             "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    <<: *restart-policy

  # ════════════════════════════════════════════════════════════
  # 数据处理层（Kafka → Flink → ClickHouse）
  # ════════════════════════════════════════════════════════════

  kafka-producer:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_producer
    networks: [backend]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python kafka/producer.py --mode scenario --rate 30
    <<: *restart-policy

  # ─── Kappa 回放服务：历史重算（按需手动触发或由 AI Agent 触发）
  # 正常情况下 restart: "no"；需要重算历史时改为 restart: on-failure 触发一次
  flink-replay:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_flink_replay
    networks: [backend]
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python flink/flink_stream_job.py --mode python --replay
    restart: "no"
    volumes:
      - .:/app

  # ─── AI 告警自动排查（每60秒）───────────────────────────
  alert-investigator:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_alert_investigator
    networks: [backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python ai_layer/alert_investigator.py --loop 60
    <<: *restart-policy
    volumes:
      - .:/app

  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_dw_flink_jm
    command: jobmanager
    networks: [frontend, backend]
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        state.checkpoints.dir: file:///flink-checkpoints
        execution.checkpointing.interval: 60s
        execution.checkpointing.mode: EXACTLY_ONCE
        rest.flamegraph.enabled: true
    volumes:
      - flink_checkpoints:/flink-checkpoints
      - .:/opt/flink/project
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5
    <<: *restart-policy

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_dw_flink_tm
    command: taskmanager
    networks: [backend]
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
    volumes:
      - flink_checkpoints:/flink-checkpoints
      - .:/opt/flink/project
    <<: *restart-policy

  flink-job:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_flink_job
    networks: [backend]
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python flink/flink_stream_job.py --mode python
    <<: *restart-policy

  # ════════════════════════════════════════════════════════════
  # AI 服务层
  # ════════════════════════════════════════════════════════════

  ai-etl:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_etl_agent
    networks: [backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python ai_etl/ai_etl_agent.py --loop 60 --lookback 5
    <<: *restart-policy

  forecaster:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_forecaster
    networks: [backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python ai_layer/forecaster.py --loop 60
    <<: *restart-policy

  insight-engine:
    build: { context: ., dockerfile: Dockerfile.producer }
    container_name: ai_dw_insight_engine
    networks: [backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python ai_layer/insight_engine.py --loop 300
    <<: *restart-policy

  # ════════════════════════════════════════════════════════════
  # 应用展示层
  # ════════════════════════════════════════════════════════════

  superset:
    build: { context: superset, dockerfile: Dockerfile }
    container_name: ai_dw_superset
    networks: [frontend, backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-ai_dw_superset_secret_2024}
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin123}
      SUPERSET_CONFIG_PATH: /app/superset_custom/superset_config.py
    volumes:
      - superset_home:/app/superset_home
      - ./superset:/app/superset_custom
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username $${SUPERSET_ADMIN_USER:-admin}
          --firstname Admin --lastname Admin
          --email admin@ai-dw.local
          --password $${SUPERSET_ADMIN_PASSWORD:-admin123} 2>/dev/null || true &&
        superset init &&
        gunicorn -w 4 -b 0.0.0.0:8088 --timeout 120 --keep-alive 5
          'superset.app:create_app()'
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    <<: *restart-policy

  superset-init:
    build: { context: superset, dockerfile: Dockerfile }
    container_name: ai_dw_superset_init
    networks: [frontend, backend]
    depends_on:
      superset:
        condition: service_healthy
    environment:
      SUPERSET_URL: http://superset:8088
      SUPERSET_ADMIN_USER: ${SUPERSET_ADMIN_USER:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin123}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
    command: python /app/superset_custom/init_superset.py
    restart: "no"

  dashboard:
    build: { context: ., dockerfile: Dockerfile.dashboard }
    container_name: ai_dw_dashboard
    networks: [frontend, backend]
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    volumes:
      - .:/app
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    <<: *restart-policy

  # ════════════════════════════════════════════════════════════
  # 可观测性层（Prometheus + Grafana）
  # ════════════════════════════════════════════════════════════

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: ai_dw_prometheus
    networks: [frontend, backend]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.route-prefix=/prometheus'
      - '--web.external-url=http://localhost/prometheus'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    <<: *restart-policy

  grafana:
    image: grafana/grafana:10.3.3
    container_name: ai_dw_grafana
    networks: [frontend, backend]
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_LOG_LEVEL: warn
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    <<: *restart-policy

  # ════════════════════════════════════════════════════════════
  # 网关层（Nginx 统一入口，仅此服务对外暴露端口）
  # ════════════════════════════════════════════════════════════

  nginx:
    image: nginx:1.25-alpine
    container_name: ai_dw_nginx
    networks: [frontend]
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - superset
      - dashboard
      - grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    <<: *restart-policy

# ── 数据卷 ────────────────────────────────────────────────────
volumes:
  clickhouse_data:
  clickhouse_logs:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  flink_checkpoints:
  superset_home:
  prometheus_data:
  grafana_data:
