version: "3.8"

x-common-env: &common-env
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_ORDERS_TOPIC: orders_stream
  KAFKA_PAYMENTS_TOPIC: payments_stream
  KAFKA_FLINK_STATS_TOPIC: flink.minute_stats
  KAFKA_FLINK_DWD_TOPIC: flink.realtime_dwd
  KAFKA_FLINK_ALERTS_TOPIC: flink.alerts
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:

  # ─── Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ai_dw_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ai_dw_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ai_dw_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── ClickHouse ────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: ai_dw_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-admin123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client",
             "--user=${CLICKHOUSE_USER:-admin}",
             "--password=${CLICKHOUSE_PASSWORD:-admin123}",
             "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka 生产者（模拟实时订单流）──────────────────────
  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: ai_dw_producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python kafka/producer.py --mode normal --rate 10
    restart: on-failure

  # ─── Flink JobManager ─────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_dw_flink_jm
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        state.checkpoints.dir: file:///flink-checkpoints
        execution.checkpointing.interval: 60s
    volumes:
      - flink_checkpoints:/flink-checkpoints
      - .:/opt/flink/project
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Flink TaskManager ────────────────────────────────────
  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: ai_dw_flink_tm
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *common-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      - flink_checkpoints:/flink-checkpoints
      - .:/opt/flink/project

  # ─── Flink 作业（Python 模拟模式，无需 Java 编译）────────
  flink-job:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: ai_dw_flink_job
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *common-env
    command: python flink/flink_stream_job.py --mode python
    restart: on-failure
    volumes:
      - .:/app

  # ─── Streamlit 看板 ───────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ai_dw_dashboard
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      <<: *common-env
    volumes:
      - .:/app
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    restart: on-failure

volumes:
  clickhouse_data:
  flink_checkpoints:
