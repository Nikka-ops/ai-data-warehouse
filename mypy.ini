[mypy]
ignore_missing_imports = True
no_implicit_optional = False
no_error_summary = True

# ── 非 src/ 模块：mypy 通过 import 追踪到这些文件，但它们不是 CI 检查目标 ──
[mypy-ai_layer.*]
ignore_errors = True

[mypy-kafka.*]
ignore_errors = True

[mypy-flink.*]
ignore_errors = True

[mypy-feature_store.*]
ignore_errors = True

[mypy-config]
ignore_errors = True

[mypy-utils.*]
ignore_errors = True

[mypy-clickhouse_connect.*]
ignore_errors = True

[mypy-langchain_core.*]
ignore_errors = True

[mypy-langchain_openai.*]
ignore_errors = True

[mypy-langgraph.*]
ignore_errors = True

# ── src/ 内部：部分模块有运行时类型注入，放宽检查 ──
[mypy-src.agent.core.supervisor]
disable_error_code = typeddict-item, assignment

[mypy-src.agent.tools.clickhouse_tool]
disable_error_code = assignment

[mypy-src.ingestion.producers.kafka_producer]
disable_error_code = attr-defined

[mypy-src.ingestion.producers.mock_producer]
disable_error_code = misc
