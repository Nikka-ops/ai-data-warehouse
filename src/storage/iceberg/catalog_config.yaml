catalog:
  name: warehouse
  type: rest
  uri: "${ICEBERG_CATALOG_URI:-http://iceberg-rest:8181}"
  warehouse: "${ICEBERG_WAREHOUSE:-s3://warehouse}"
  s3:
    endpoint: "${MINIO_ENDPOINT:-http://minio:9000}"
    access-key-id: "${MINIO_ACCESS_KEY:-minioadmin}"
    secret-access-key: "${MINIO_SECRET_KEY:-minioadmin}"
    path-style-access: true
