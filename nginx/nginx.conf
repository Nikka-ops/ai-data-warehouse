worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;

    # 安全头
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # ── 上游服务定义 ──────────────────────────────────────────
    upstream superset    { server superset:8088;    keepalive 16; }
    upstream streamlit   { server dashboard:8501;   keepalive 16; }
    upstream grafana     { server grafana:3000;      keepalive 16; }
    upstream flink       { server flink-jobmanager:8081; keepalive 8; }
    upstream kafka_ui    { server kafka-ui:8080;    keepalive 8; }
    upstream feature_api { server feature-api:8000;  keepalive 16; }

    # ── 主服务器（80）────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # 根路径 → Superset BI 看板
        location / {
            proxy_pass         http://superset;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_http_version 1.1;
        }

        # /ai → Streamlit AI 对话界面（WebSocket 支持）
        location /ai {
            rewrite ^/ai(.*)$ $1 break;
            proxy_pass         http://streamlit;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # /grafana → Grafana 监控看板
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
        }

        # /flink → Flink Web UI
        location /flink/ {
            proxy_pass         http://flink/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_http_version 1.1;
        }

        # /kafka → Kafka UI
        location /kafka/ {
            proxy_pass         http://kafka_ui/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_http_version 1.1;
        }

        # /api → Feature Store REST API（FastAPI）
        location /api/ {
            proxy_pass         http://feature_api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_read_timeout 60;
        }

        # 健康检查端点
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
